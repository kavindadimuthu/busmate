name: Deploy to EC2

on:
  push:
    branches:
      - "dev"
      - "fix/stops-issue"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          source: "target/*.jar"
          target: "/home/ec2-user/${{ github.event.repository.name }}/"
          # This copies the entire target directory with JAR inside

      - name: Deploy Docker container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          script: |
            REPO_NAME="${{ github.event.repository.name }}"
            cd /home/ec2-user/$REPO_NAME
            
            echo "=== Current directory structure ==="
            pwd
            find . -type f -name "*.jar"
            
            # Create Dockerfile that copies from target/ directory
            cat <<EOF > Dockerfile
            FROM eclipse-temurin:21-jdk
            WORKDIR /app
            COPY ./target/*.jar app.jar
            RUN echo "JAR file copied successfully" && ls -la /app
            ENTRYPOINT ["java", "-jar", "app.jar"]
            EXPOSE 8080
            EOF
            
            echo "=== Dockerfile content ==="
            cat Dockerfile
            
            # Build Docker image
            echo "=== Building Docker image ==="
            docker build --no-cache -t $REPO_NAME .
            
            # Stop and remove existing container
            docker rm -f $REPO_NAME 2>/dev/null || true
            
            # Run new container
            echo "=== Starting container ==="
            docker run -d \
              --restart unless-stopped \
              --name $REPO_NAME \
              -p 8080:8080 \
              $REPO_NAME
            
            # Check status
            sleep 10
            echo "=== Container status ==="
            docker ps -a --filter "name=$REPO_NAME"
            echo "=== Container logs ==="
            docker logs $REPO_NAME || echo "No logs yet"