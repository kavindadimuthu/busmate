name: Deploy to EC2

on:
  push:
    branches:
      - "dev"
      - "fix/stops-issue"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: mvn clean package -DskipTests

      # Get the JAR filename
      - name: Get JAR filename
        id: jar_name
        run: |
          JAR_FILE=$(ls target/*.jar | head -n 1)
          echo "jar_file=${JAR_FILE}" >> $GITHUB_OUTPUT

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          source: "target/*.jar"
          target: "/home/ec2-user/${{ github.event.repository.name }}/"

      - name: Deploy Docker container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          script: |
            REPO_NAME="${{ github.event.repository.name }}"
            JAR_FILE="$(basename target/*.jar)"  # Get the JAR filename
            
            cd /home/ec2-user/$REPO_NAME
            
            # Create proper Dockerfile that references the actual JAR location
            cat <<EOF > Dockerfile
            FROM eclipse-temurin:21-jdk
            WORKDIR /app
            COPY $JAR_FILE app.jar
            ENTRYPOINT ["java", "-jar", "app.jar"]
            EXPOSE 8080
            EOF
            
            # Build Docker image
            docker build -t $REPO_NAME .
            
            # Stop and remove existing container
            docker rm -f $REPO_NAME 2>/dev/null || true
            
            # Run new container
            docker run -d \
              --restart unless-stopped \
              --network=host \
              --name $REPO_NAME \
              -p 8080:8080 \
              $REPO_NAME
