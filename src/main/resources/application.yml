logging:
  level:
    com.busmate.routeschedule: INFO  # Reduce debug logging
    org.springframework: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: DEBUG  # Enable HikariCP logging for monitoring
    org.springframework.jdbc: WARN
    org.postgresql: WARN
    
  # Configure connection pool logging
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,hikaricp
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    hikaricp:
      enabled: true  # Enable HikariCP metrics endpoint
  health:
    db:
      enabled: true
  metrics:
    export:
      simple:
        enabled: true

# Connection retry and resilience configuration
resilience4j:
  retry:
    instances:
      database:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.net.SocketTimeoutException
          - org.postgresql.util.PSQLException
          - org.springframework.dao.DataAccessResourceFailureException

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: operationId
  show-actuator: false